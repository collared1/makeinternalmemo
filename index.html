<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Memo Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <style>
      html, body {
        background-color: #333333;
        color: white;
        font-family: "Roboto Mono", monospace;
        display: flex;
        width: 100%;
        justify-content: center;
        flex-direction: column;
        padding: 0px 30px;
        box-sizing: border-box;
      }
      a {
        color: white;
      }
      textarea {
        resize: none;
        background-color: black;
        border: 1px solid white;
        margin: 3px;
        color: white;
      }
      textarea::placeholder {
        color: white;
      }
      button {
        background-color: black;
        border: 1px solid white;
        color: white;
        font-family: "Roboto Mono", monospace;
        margin: 3px;
      }
      .classification_buttons {
        display: flex;
        flex-direction: row;
        width: 100%;
      }
      .classification_buttons button {
        width: 25%;
        height: 50px;
        cursor: pointer;
      }
      .output {
        background-color: black;
        border: 1px solid white;
        height: 100px;
        padding: 5px;
        margin: 3px;
      }
    </style>
  </head>
  <body>
    <div class="output">
      <p id="status" style="display: none;"></p>
      <a id="result" href="#" target="_blank" style="display: none;"></a>
      <p id="currentClassification">Current Classification: UNCLASSIFIED</p>
    </div>
    <button onclick="generate()">Generate Memo</button>
    <div class="classification_buttons">
      <button id="UNCLASSIFIED">Unclassified</button>
      <button id="CONFIDENTIAL">Confidential</button>
      <button id="SECRET">Secret</button>
      <button id="TOP SECRET">Top Secret</button>
    </div>
    <textarea id="PASSWORD" placeholder="Enter the password given to you by Collared."></textarea>
    <textarea id="FROMUSER" placeholder="Who is sending this memo?"></textarea>
    <textarea id="TOUSER" placeholder="Who is receiving this memo?"></textarea>
    <textarea id="SUBJECT" placeholder="What is the subject of this memo?"></textarea>
    <textarea id="SUMMARY" placeholder="Give a brief summary of this memo's content."></textarea>
    <textarea id="H1TITLE" placeholder="(OPTIONAL) Give a title for section 1."></textarea>
    <textarea id="H1TEXT" placeholder="(OPTIONAL) Give the text content for section 1."></textarea>
    <textarea id="H2TITLE" placeholder="(OPTIONAL) Give a title for section 2."></textarea>
    <textarea id="H2TEXT" placeholder="(OPTIONAL) Give the text content for section 2."></textarea>
    <textarea id="H3TITLE" placeholder="(OPTIONAL) Give a title for section 3."></textarea>
    <textarea id="H3TEXT" placeholder="(OPTIONAL) Give the text content for section 3."></textarea>
    <textarea id="H4TITLE" placeholder="(OPTIONAL) Give a title for section 4."></textarea>
    <textarea id="H4TEXT" placeholder="(OPTIONAL) Give the text content for section 4."></textarea>
    <textarea id="H5TITLE" placeholder="(OPTIONAL) Give a title for section 5."></textarea>
    <textarea id="H5TEXT" placeholder="(OPTIONAL) Give the text content for section 5."></textarea>
    <textarea id="H6TITLE" placeholder="(OPTIONAL) Give a title for section 6."></textarea>
    <textarea id="H6TEXT" placeholder="(OPTIONAL) Give the text content for section 6."></textarea>
    <textarea id="H7TITLE" placeholder="(OPTIONAL) Give a title for section 7."></textarea>
    <textarea id="H7TEXT" placeholder="(OPTIONAL) Give the text content for section 7."></textarea>
    <textarea id="H8TITLE" placeholder="(OPTIONAL) Give a title for section 8."></textarea>
    <textarea id="H8TEXT" placeholder="(OPTIONAL) Give the text content for section 8."></textarea>
    <textarea id="H9TITLE" placeholder="(OPTIONAL) Give a title for section 9."></textarea>
    <textarea id="H9TEXT" placeholder="(OPTIONAL) Give the text content for section 9."></textarea>
    <textarea id="H10TITLE" placeholder="(OPTIONAL) Give a title for section 10."></textarea>
    <textarea id="H10TEXT" placeholder="(OPTIONAL) Give the text content for section 10."></textarea>
    <script>
      const WORKER_URL = "https://memo-proxy.solarisgd1000.workers.dev/";

      let currentClassification = "UNCLASSIFIED"

      const classificationButtons = document.querySelectorAll(".classification_button button");

      for(const classificationButton of classificationButtons) {
        console.log("ADDED EVENT LISTENER TO CLASSIFICATIONBUTTON");
        classificationButton.addEventListener("mousedown", handleClassificationButtonPress);
      }

      function handleClassificationButtonPress(event) {
        console.log("HANDLING CLASSIFICATION BUTTON PRESS")
        button = event.target;
        currentClassification = button.id;
        currentClassificationNotifier = document.getElementById("currentClassification");
        currentClassificationNotifier.innerHTML = "Current Classification: " + currentClassificaton;
      }
    
      async function generate() {
        const status = document.getElementById("status");
        const result = document.getElementById("result");
    
    
        try {
          result.innerHTML = "";
          const documentElements = {};
          documentElements.fromuser = await document.getElementById("FROMUSER");
          documentElements.touser = await document.getElementById("TOUSER");
          documentElements.subject = await document.getElementById("SUBJECT");
          documentElements.summary = await document.getElementById("SUMMARY");
          documentElements.password = await document.getElementById("PASSWORD");
          const headerElements = {}

          for (let i = 1; i <= 10; i++) {
            headerElements[`H${i}TITLE`] = await document.getElementById(`H${i}TITLE`);
            headerElements[`H${i}TEXT`] = await document.getElementById(`H${i}TEXT`);
          }
          for (const value of Object.values(documentElements)) {
            if (value.value == "") {
              status.style.display = "inline";
              status.innerHTML = "All non-optional text areas must be filled in to generate a memo.";
              return;
            }
          }
          let payload = {
            "PASSWORD":documentElements.password.value,
            "CLASSIFICATION":currentClassification,
            "FROMUSER":documentElements.fromuser.value,
            "TOUSER":documentElements.touser.value,
            "SUBJECT":documentElements.subject.value,
            "SUMMARY":documentElements.summary.value,
          };
          for (const [key, value] of Object.entries(headerElements)) {
            payload[key] = value.value;
          }
          payload = JSON.stringify(payload);
          status.style.display = "inline";
          status.textContent = "Generating. May take up to a minute...";
          const res  = await fetch(WORKER_URL, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    payload,
          });
          const data = await res.json();
    
          if (data.success) {
            result.style.display = "inline"
            result.href = data.url;
            result.textContent = data.url;
            status.textContent = "Make a copy of this document:"
          } else {
            status.textContent = "Error: " + (data.error || "Unknown error");
          }
        } catch (err) {
          status.textContent = "Network error: " + err.message;
        }
      }
    </script>
  </body>
</html>
