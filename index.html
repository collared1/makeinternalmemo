<html>
    <head>
        <style>
            
        </style>
    </head>
    <body>
        v1.0.0
        <script>
            async function generateMemo({
                classification,
                fromUser,
                toUser,
                subject,
                summary,
                callbackUrl = null,
                sections = []
            }) {
                const payload = {
                    CLASSIFICATION: classification,
                    FROMUSER: fromUser,
                    TOUSER: toUser,
                    SUBJECT: subject,
                    SUMMARY: summary,
                    CALLBACK_URL: callbackUrl
                };
            
                for (let i = 0; i < sections.length && i < 10; i++) {
                    const s = sections[i];
                    if (s.title) payload[`H${i + 1}TITLE`] = s.title;
                    if (s.text) payload[`H${i + 1}TEXT`] = s.text;
                }
            
                try {
                    const res = await fetch("https://script.google.com/macros/s/AKfycbyyXPSB-6WSvMeOgxW22R1FsX1-Y1kiM3FwLykZ_pp8hOfTneDoLA38_rfHO-c11XWxjQ/exec", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(payload)
                    });
            
                    const data = await res.json();
            
                    if (!data.success) {
                        return { success: false, error: data.error };
                    }
            
                    return { success: true, link: data.LINK };
            
                } catch (err) {
                    return { success: false, error: err.message };
                }
            }
            async function main() {
                const result = await generateMemo({
                    classification: "SECRET",
                    fromUser: "Alice",
                    toUser: "Bob",
                    subject: "Security Review",
                    summary: "Summary goes here.",
                    callbackUrl: "https://makeinternalmemo.pages.dev/makeinternalmemo",
                    sections: [
                        { title: "Background", text: "Background information." },
                        { title: "Analysis", text: "Analysis information." }
                    ]
                });
            
                if (result.success) {
                    console.log("DOC:", result.link);
                } else {
                    console.error("ERROR:", result.error);
                }
            }
            
            main();
        </script>
    </body>
</html>
