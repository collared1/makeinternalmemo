<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Memo Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <style>
      html, body {
        background-color: #333333;
        color: white;
        font-family: "Roboto Mono", monospace;
      }
    </style>
  </head>
  <body>
    
    <button onclick="generate()">Generate Memo</button>
    <p id="status"></p>
    <a id="result" href="#" target="_blank" style="display:none"></a>
    
    <script>
      const WORKER_URL = "https://memo-proxy.solarisgd1000.workers.dev/";
    
      function buildPayload() {
        return {
          CLASSIFICATION: "CONFIDENTIAL",
          FROMUSER:  "Princip. DD-DSS, Julius Caesar",
          TOUSER:    "Secretary of State, Mike Johnson",
          SUBJECT:   "Testing memo creation system.",
          SUMMARY:   "This memorandum is a test of the new memorandum creation system developed by me.",
        };
      }
    
      async function generate() {
        const status = document.getElementById("status");
        const result = document.getElementById("result");
    
        status.textContent = "Generating… May take a while.";
        result.style.display = "none";
    
        try {
          const res  = await fetch(WORKER_URL, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify(buildPayload()),
          });
          const data = await res.json();
    
          if (data.success) {
            result.href = data.url;
            result.textContent = "Make a copy of this document:" + data.url;
          } else {
            status.textContent = "Please contact the programmer, c0llared_, as an unexpected error has come up. Paste this: Error: " + (data.error || "Unknown error");
          }
        } catch (err) {
          status.textContent = "Network error: " + err.message;
        }
      }
    </script>
  </body>
</html>
