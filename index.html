<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Memo Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <style>
      html, body {
        background-color: #333333;
        color: white;
        font-family: "Roboto Mono", monospace;
      }
      a {
        color: white;
      }
    </style>
  </head>
  <body>
    
    <button onclick="generate()">Generate Memo</button>
    <p id="status"></p>
    <a id="result" href="#" target="_blank"></a>
    <textarea id="FROMUSER">Who is sending this memo?</textarea>
    <textarea id="TOUSER">Who is receiving this memo?</textarea>
    <textarea id="SUBJECT">What is the subject of this memo?</textarea>
    <textarea id="SUMMARY">Give a brief summary of this memo's content.</textarea>

    <textarea id="H1TITLE">(OPTIONAL) Give a title for section 1.</textarea>
    <textarea id="H1TEXT">(OPTIONAL) Give the text content for section 1.</textarea>
    
    <textarea id="H2TITLE">(OPTIONAL) Give a title for section 2.</textarea>
    <textarea id="H2TEXT">(OPTIONAL) Give the text content for section 2.</textarea>
    
    <textarea id="H3TITLE">(OPTIONAL) Give a title for section 3.</textarea>
    <textarea id="H3TEXT">(OPTIONAL) Give the text content for section 3.</textarea>
    
    <textarea id="H4TITLE">(OPTIONAL) Give a title for section 4.</textarea>
    <textarea id="H4TEXT">(OPTIONAL) Give the text content for section 4.</textarea>
    
    <textarea id="H5TITLE">(OPTIONAL) Give a title for section 5.</textarea>
    <textarea id="H5TEXT">(OPTIONAL) Give the text content for section 5.</textarea>
    
    <textarea id="H6TITLE">(OPTIONAL) Give a title for section 6.</textarea>
    <textarea id="H6TEXT">(OPTIONAL) Give the text content for section 6.</textarea>
    
    <textarea id="H7TITLE">(OPTIONAL) Give a title for section 7.</textarea>
    <textarea id="H7TEXT">(OPTIONAL) Give the text content for section 7.</textarea>
    
    <textarea id="H8TITLE">(OPTIONAL) Give a title for section 8.</textarea>
    <textarea id="H8TEXT">(OPTIONAL) Give the text content for section 8.</textarea>
    
    <textarea id="H9TITLE">(OPTIONAL) Give a title for section 9.</textarea>
    <textarea id="H9TEXT">(OPTIONAL) Give the text content for section 9.</textarea>
    
    <textarea id="H10TITLE">(OPTIONAL) Give a title for section 10.</textarea>
    <textarea id="H10TEXT">(OPTIONAL) Give the text content for section 10.</textarea>
    
    <script>
      const WORKER_URL = "https://memo-proxy.solarisgd1000.workers.dev/";
    
      function buildPayload() {
        return {
          CLASSIFICATION: "CONFIDENTIAL",
          FROMUSER:  "Princip. DD-DSS, Julius Caesar",
          TOUSER:    "Secretary of State, Mike Johnson",
          SUBJECT:   "Testing memo creation system.",
          SUMMARY:   "This memorandum is a test of the new memorandum creation system developed by me.",
        };
      }
    
      async function generate() {
        const status = document.getElementById("status");
        const result = document.getElementById("result");
    
        status.textContent = "Generating… May take a while.";
    
        try {
          const res  = await fetch(WORKER_URL, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify(buildPayload()),
          });
          const data = await res.json();
    
          if (data.success) {
            result.href = data.url;
            result.textContent = data.url;
            status.textContent = "Make a copy of this document:"
          } else {
            status.textContent = "Please contact the programmer, c0llared_, as an unexpected error has come up. Paste this: Error: " + (data.error || "Unknown error");
          }
        } catch (err) {
          status.textContent = "Network error: " + err.message;
        }
      }
    </script>
  </body>
</html>
