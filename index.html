<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Memo Generator</title>
</head>

<body>

<h2>Memo Generator</h2>

<button onclick="main()">Generate Memo</button>

<p id="status"></p>

<script>

const WORKER_URL = "https://memo-proxy.solarisgd1000.workers.dev";

async function generateMemo({
    classification,
    fromUser,
    toUser,
    subject,
    summary,
    callbackUrl = null,
    sections = []
}) {

    const payload = {
        CLASSIFICATION: classification,
        FROMUSER: fromUser,
        TOUSER: toUser,
        SUBJECT: subject,
        SUMMARY: summary
    };

    if (callbackUrl) {
        payload.CALLBACK_URL = callbackUrl;
    }

    for (let i = 0; i < sections.length && i < 10; i++) {
        if (sections[i].title) {
            payload[`H${i + 1}TITLE`] = sections[i].title;
        }
        if (sections[i].text) {
            payload[`H${i + 1}TEXT`] = sections[i].text;
        }
    }

    try {

        const formData = new FormData();
        formData.append("payload", JSON.stringify(payload));

        console.log("SENDING TO WORKER");

        await fetch(WORKER_URL, {
            method: "POST",
            body: formData
        });
        
        console.log("SENT");

        return {
            success: true
        };

    } catch (err) {
        return {
            success: false,
            error: err.message
        };
    }
}

async function main() {

    const status = document.getElementById("status");

    status.innerText = "Generating memo...";

    const result = await generateMemo({
        classification: "SECRET",
        fromUser: "Alice",
        toUser: "Bob",
        subject: "Security Review",
        summary: "This is a test memo generated via Worker proxy.",
        callbackUrl: "https://makeinternalmemo.pages.dev/makeinternalmemo",
        sections: [
            {
                title: "Background",
                text: "Background information"
            },
            {
                title: "Analysis",
                text: "Analysis information"
            }
        ]
    });

    if (result.success) {
        status.innerText = "Request sent. Waiting for document link...";
    } else {
        status.innerText = "Error: " + result.error;
    }
}

</script>

</body>
</html>
