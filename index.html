<html>
    <head>
        <style>
            
        </style>
    </head>
    <body>
        <script>
            async function main() {
                const result = await generateMemo({
                      classification: "SECRET",
                      fromUser: "Alice",
                      toUser: "Bob",
                      subject: "Security Review",
                      summary: "Summary goes here.",
                      callbackUrl: "https://collared1.github.io/makeinternalmemo",
                      sections: [
                        {
                          title: "Background",
                          text: "Background information."
                        },
                        {
                          title: "Analysis",
                          text: "Analysis information."
                        }
                      ]
                    });
    
                if (result.success) {
                  console.log(result.link);
                } else {
                  console.error(result.error);
                }
            }
            async function generateMemo({
              classification,
              fromUser,
              toUser,
              subject,
              summary,
              callbackUrl = null,
              sections = []
            }) {
            
              const payload = {
                CLASSIFICATION: classification,
                FROMUSER: fromUser,
                TOUSER: toUser,
                SUBJECT: subject,
                SUMMARY: summary
              };
            
              if (callbackUrl) {
                payload.CALLBACK_URL = callbackUrl;
              }
            
              for (let i = 0; i < sections.length && i < 10; i++) {
                const section = sections[i];
            
                if (section.title) {
                  payload[`H${i + 1}TITLE`] = section.title;
                }
            
                if (section.text) {
                  payload[`H${i + 1}TEXT`] = section.text;
                }
              }
            
              const formData = new FormData();
            
              formData.append(
                "payload",
                JSON.stringify(payload)
              );
            
              try {
            
                const response = await fetch(
                  "https://script.google.com/macros/s/AKfycbyyXPSB-6WSvMeOgxW22R1FsX1-Y1kiM3FwLykZ_pp8hOfTneDoLA38_rfHO-c11XWxjQ/exec",
                  {
                    method: "POST",
                    body: formData
                  }
                );
            
                const data = await response.json();
            
                if (!data.success) {
                  return {
                    success: false,
                    error: data.error || "Unknown error"
                  };
                }
            
                return {
                  success: true,
                  link: data.LINK
                };
            
              } catch (err) {
            
                return {
                  success: false,
                  error: err.message
                };
            
              }
            }
            main()
        </script>
    </body>
</html>
