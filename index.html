<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Memo Generator</title>
</head>

<body>

<h2>Memo Generator</h2>

<button onclick="main()">Generate Memo</button>

<p id="status"></p>

<script>

const WORKER_URL = "https://memo-proxy.solarisgd1000.workers.dev";

async function generateMemo(payload) {

    console.log("SENDING TO WORKER");

    try {

        await fetch(WORKER_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        console.log("SENT");

        return { success: true };

    } catch (err) {

        return {
            success: false,
            error: err.message
        };
    }
}

async function main() {

    const status = document.getElementById("status");

    status.innerText = "Generating memo...";

    const result = await generateMemo({
        CLASSIFICATION: "SECRET",
        FROMUSER: "Alice",
        TOUSER: "Bob",
        SUBJECT: "Security Review",
        SUMMARY: "This is a test memo generated through Worker proxy.",
        CALLBACK_URL: "https://makeinternalmemo.pages.dev/makeinternalmemo",
        H1TITLE: "Background",
        H1TEXT: "Background info",
        H2TITLE: "Analysis",
        H2TEXT: "Analysis info"
    });

    if (result.success) {

        status.innerText = "Request sent. Waiting for document link...";

    } else {

        status.innerText = "Error: " + result.error;
    }
}

</script>

</body>
</html>
